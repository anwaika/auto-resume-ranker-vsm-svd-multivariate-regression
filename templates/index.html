<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Ranker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Resume Ranker</h1>

<form method="POST" enctype="multipart/form-data">

<label>Enter Job Description:</label><br>
<textarea name="job_desc" rows="6" cols="60" required></textarea><br><br>

<label>Upload Resumes:</label><br>
<input type="file" name="resumes" multiple required><br><br>

<button type="submit">Rank Resumes</button>

</form>

<hr>

{% if rankings %}
<h2>Results</h2>

<ol>
{% for name, score in rankings %}
<li>{{ name }} - {{ (score * 100) | round(2) }}%</li>
{% endfor %}
</ol>

{% endif %}

</body>
</html>
